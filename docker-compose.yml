services:
  # ─── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
      POSTGRES_DB: sdp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Go) — dev server with live-reload ──────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.development
    ports:
      - "8000:8000"      # Application API (default: 8000)
      - "8002:8002"      # Metrics
      - "8003:8003"      # Admin API
      - "2345:2345"      # Delve debugger (if using debug build)
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://sdp:sdp@db:5432/sdp?sslmode=disable"
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      SDP_UI_BASE_URL: ${SDP_UI_BASE_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4000}
    working_dir: /app/github.com/stellar/stellar-disbursement-platform

  # ─── Frontend (React / Vite) — dev server with HMR ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
      REACT_APP_SINGLE_TENANT_MODE: ${REACT_APP_SINGLE_TENANT_MODE:-true}
      REACT_APP_DISABLE_RECAPTCHA: ${REACT_APP_DISABLE_RECAPTCHA:-true}
    volumes:
      # Bind-mount source (excluding node_modules) for HMR
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      # Preserve node_modules from the image
      - /app/node_modules

  # ─── Demo Wallet (Stellar demo wallet for testing disbursements) ─
  demo-wallet:
    build:
      context: ./backend/dev
      dockerfile: Dockerfile-demo-wallet
    ports:
      - "4000:80"
    volumes:
      - ./dev/env-config-demo-wallet.js:/usr/share/nginx/html/settings/env-config.js

  # ─── TSS (Transaction Submission Service) ────────────────────────────
  tss:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://sdp:sdp@db:5432/sdp?sslmode=disable"
      NETWORK_PASSPHRASE: ${NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}
      HORIZON_URL: ${HORIZON_URL:-https://horizon-testnet.stellar.org}
      RPC_URL: ${RPC_URL:-https://soroban-testnet.stellar.org}
      RPC_REQUEST_AUTH_HEADER_KEY: ${RPC_REQUEST_AUTH_HEADER_KEY:-}
      RPC_REQUEST_AUTH_HEADER_VALUE: ${RPC_REQUEST_AUTH_HEADER_VALUE:-}
      NUM_CHANNEL_ACCOUNTS: ${NUM_CHANNEL_ACCOUNTS:-3}
      MAX_BASE_FEE: "${MAX_BASE_FEE:-1000000}"
      TSS_METRICS_PORT: ${TSS_METRICS_PORT:-9002}
      TSS_METRICS_TYPE: ${TSS_METRICS_TYPE:-TSS_PROMETHEUS}
      DISTRIBUTION_PUBLIC_KEY: ${DISTRIBUTION_PUBLIC_KEY}
      DISTRIBUTION_SEED: ${DISTRIBUTION_SEED}
      DISTRIBUTION_ACCOUNT_ENCRYPTION_PASSPHRASE: ${DISTRIBUTION_ACCOUNT_ENCRYPTION_PASSPHRASE}
      CHANNEL_ACCOUNT_ENCRYPTION_PASSPHRASE: ${CHANNEL_ACCOUNT_ENCRYPTION_PASSPHRASE}
    entrypoint: ""
    command:
      - sh
      - -c
      - |
        sleep 10
        ./stellar-disbursement-platform channel-accounts ensure 1
        ./stellar-disbursement-platform tss

volumes:
  pgdata:
