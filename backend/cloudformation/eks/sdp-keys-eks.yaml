AWSTemplateFormatVersion: '2010-09-09'
Description: 'Stack for managing Stellar and encryption keys in Secrets Manager for EKS'

Parameters:
  # -- Config parameters --
  env:
    Type: String
    Default: "dev"
    AllowedValues: 
      - dev
      - staging
      - prod
    Description: Environment name

  namespace:
    Type: String
    Description: "Environment variable: namespace - Kubernetes namespace where SDP will be deployed"
    Default: "sdp"

  # -- Required for generating secrets --
  StellarLayerS3Bucket:
    Type: String
    Description: "S3 bucket containing the Stellar SDK Lambda layer"
    Default: ""
  
  # -- Core secrets (with default values) --
  Ec256PrivateKey:
    Type: String
    NoEcho: true
    Default: |
      -----BEGIN EC PRIVATE KEY-----
      MHcCAQEEIPRRtyc5EQoNPFhkcDzC47B2Zpo5b0NiM3Ftvky86+bEoAoGCCqGSM49
      AwEHoUQDQgAEWinhVw0QHkZDeZ777zfBKT0cupULkpEd8Y52iPs76AT7JQ1cuGbm
      jxJASNwp907KzNzOZJSV07bFdN/Tkwebgg==
      -----END EC PRIVATE KEY-----
    Description: "Environment variable: EC256_PRIVATE_KEY"

  Sep24JwtSecret:
    Type: String
    NoEcho: true
    Default: "jwt_secret_1234567890"
    Description: "Environment variable: SEP24_JWT_SECRET"

  AdminApiKey:
    Type: String
    NoEcho: true
    Default: "admin-api-key"
    Description: "Environment variable: ADMIN_API_KEY"

  AdminAccount:
    Type: String
    NoEcho: true
    Default: "admin@example.org"
    Description: "Environment variable: ADMIN_ACCOUNT"

  RecaptchaSiteSecretKey:
    Type: String
    NoEcho: true
    Default: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
    Description: "Environment variable: RECAPTCHA_SITE_SECRET_KEY"

  # -- Stellar keys and passphrases with generated values if left blank and StellarLayerS3Bucket is supplied --
  Sep10SigningPrivateKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: SEP10_SIGNING_PRIVATE_KEY"

  Sep10SigningPublicKey:
    Type: String
    Default: ""
    Description: "Environment variable: SEP10_SIGNING_PUBLIC_KEY"

  DistributionSeed:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: DISTRIBUTION_SEED"

  DistributionPublicKey:
    Type: String
    Default: ""
    Description: "Environment variable: DISTRIBUTION_PUBLIC_KEY"

  DistributionAccountEncryptionPassphrase:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: DISTRIBUTION_ACCOUNT_ENCRYPTION_PASSPHRASE"

  ChannelAccountEncryptionPassphrase:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: CHANNEL_ACCOUNT_ENCRYPTION_PASSPHRASE"

  # -- Optional integration secrets created only when value is supplied --
  # AWS messaging (SES email / SNS SMS)
  AwsAccessKeyId:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: AWS_ACCESS_KEY_ID"

  AwsSecretAccessKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: AWS_SECRET_ACCESS_KEY"

  AwsRegion:
    Type: String
    Default: ""
    Description: "Environment variable: AWS_REGION"

  AwsSesSenderId:
    Type: String
    Default: ""
    Description: "Environment variable: AWS_SES_SENDER_ID"

  AwsSnsSenderId:
    Type: String
    Default: ""
    Description: "Environment variable: AWS_SNS_SENDER_ID"

  # Twilio (SMS / WhatsApp / SendGrid email)
  TwilioAccountSid:
    Type: String
    Default: ""
    Description: "Environment variable: TWILIO_ACCOUNT_SID"

  TwilioAuthToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: TWILIO_AUTH_TOKEN"

  TwilioServiceSid:
    Type: String
    Default: ""
    Description: "Environment variable: TWILIO_SERVICE_SID"

  TwilioWhatsappFromNumber:
    Type: String
    Default: ""
    Description: "Environment variable: TWILIO_WHATSAPP_FROM_NUMBER"

  TwilioWhatsappReceiverInvitationTemplateSid:
    Type: String
    Default: ""
    Description: "Environment variable: TWILIO_WHATSAPP_RECEIVER_INVITATION_TEMPLATE_SID"

  TwilioWhatsappReceiverOtpTemplateSid:
    Type: String
    Default: ""
    Description: "Environment variable: TWILIO_WHATSAPP_RECEIVER_OTP_TEMPLATE_SID"

  TwilioSendgridApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: TWILIO_SENDGRID_API_KEY"

  TwilioSendgridSenderAddress:
    Type: String
    Default: ""
    Description: "Environment variable: TWILIO_SENDGRID_SENDER_ADDRESS"

  # Monitoring and logging configuration
  SentryDsn:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: SENTRY_DSN"

  # RPC Configuration
  RpcRequestAuthHeaderValue:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: RPC_REQUEST_AUTH_HEADER_VALUE"

  # Bridge integration
  BridgeApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Environment variable: BRIDGE_API_KEY"

Rules:
  LayerBucketRequiredWhenGenerating:
    RuleCondition: !Or
      - !Equals [ !Ref Sep10SigningPublicKey, "" ]
      - !Equals [ !Ref DistributionPublicKey, "" ]
      - !Equals [ !Ref DistributionAccountEncryptionPassphrase, "" ]
      - !Equals [ !Ref ChannelAccountEncryptionPassphrase, "" ]
    Assertions:
      - Assert: !Not [ !Equals [ !Ref StellarLayerS3Bucket, "" ] ]
        AssertDescription: "StellarLayerS3Bucket must be provided when any Stellar key/passphrase is left blank for auto-generation."
  Sep10PublicKeyRequiresPrivate:
    RuleCondition: !Not [ !Equals [ !Ref Sep10SigningPublicKey, "" ] ]
    Assertions:
      - Assert: !Not [ !Equals [ !Ref Sep10SigningPrivateKey, "" ] ]
        AssertDescription: "Sep10SigningPrivateKey must be provided when Sep10SigningPublicKey is set."
  DistributionPublicKeyRequiresSeed:
    RuleCondition: !Not [ !Equals [ !Ref DistributionPublicKey, "" ] ]
    Assertions:
      - Assert: !Not [ !Equals [ !Ref DistributionSeed, "" ] ]
        AssertDescription: "DistributionSeed must be provided when DistributionPublicKey is set."

Conditions:
  GenerateSep10Keys: !Equals [ !Ref Sep10SigningPublicKey, "" ]
  GenerateDistributionKeys: !Equals [ !Ref DistributionPublicKey, "" ]
  GenerateDistributionEncryptionPassphrase: !Equals [ !Ref DistributionAccountEncryptionPassphrase, "" ]
  GenerateChannelEncryptionPassphrase: !Equals [ !Ref ChannelAccountEncryptionPassphrase, "" ]
  NeedKeyGeneration: !Or
    - !Condition GenerateSep10Keys
    - !Condition GenerateDistributionKeys
    - !Condition GenerateDistributionEncryptionPassphrase
    - !Condition GenerateChannelEncryptionPassphrase

  HasAwsAccessKeyId: !Not [ !Equals [ !Ref AwsAccessKeyId, "" ] ]
  HasAwsSecretAccessKey: !Not [ !Equals [ !Ref AwsSecretAccessKey, "" ] ]
  HasAwsRegion: !Not [ !Equals [ !Ref AwsRegion, "" ] ]
  HasAwsSesSenderId: !Not [ !Equals [ !Ref AwsSesSenderId, "" ] ]
  HasAwsSnsSenderId: !Not [ !Equals [ !Ref AwsSnsSenderId, "" ] ]
  HasTwilioAccountSid: !Not [ !Equals [ !Ref TwilioAccountSid, "" ] ]
  HasTwilioAuthToken: !Not [ !Equals [ !Ref TwilioAuthToken, "" ] ]
  HasTwilioServiceSid: !Not [ !Equals [ !Ref TwilioServiceSid, "" ] ]
  HasTwilioWhatsappFromNumber: !Not [ !Equals [ !Ref TwilioWhatsappFromNumber, "" ] ]
  HasTwilioWhatsappReceiverInvitationTemplateSid: !Not [ !Equals [ !Ref TwilioWhatsappReceiverInvitationTemplateSid, "" ] ]
  HasTwilioWhatsappReceiverOtpTemplateSid: !Not [ !Equals [ !Ref TwilioWhatsappReceiverOtpTemplateSid, "" ] ]
  HasTwilioSendgridApiKey: !Not [ !Equals [ !Ref TwilioSendgridApiKey, "" ] ]
  HasTwilioSendgridSenderAddress: !Not [ !Equals [ !Ref TwilioSendgridSenderAddress, "" ] ]
  HasSentryDsn: !Not [ !Equals [ !Ref SentryDsn, "" ] ]
  HasRpcRequestAuthHeaderValue: !Not [ !Equals [ !Ref RpcRequestAuthHeaderValue, "" ] ]
  HasBridgeApiKey: !Not [ !Equals [ !Ref BridgeApiKey, "" ] ]

Resources:
  StellarKeyGenRole:
    Type: AWS::IAM::Role
    Condition: NeedKeyGeneration
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StellarSDKLayer:
    Type: AWS::Lambda::LayerVersion
    Condition: NeedKeyGeneration
    Properties:
      LayerName: stellar-sdk-layer
      Content: 
        S3Bucket: !Ref StellarLayerS3Bucket
        S3Key: stellar-layer.zip
      CompatibleRuntimes:
        - nodejs22.x

  StellarKeyGenFunction:
    Type: AWS::Lambda::Function
    Condition: NeedKeyGeneration
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt StellarKeyGenRole.Arn
      Timeout: 30
      Layers:
        - !Ref StellarSDKLayer
      Code:
        ZipFile: |
          const { Keypair } = require('@stellar/stellar-sdk');
          const https = require('https');
          const url = require('url');

          async function fundTestnetAccount(publicKey) {
            return new Promise((resolve, reject) => {
              https.get(`https://friendbot.stellar.org?addr=${publicKey}`, (resp) => {
                let data = '';
                resp.on('data', (chunk) => data += chunk);
                resp.on('end', () => {
                  console.log('Funding response:', data);
                  resolve(data);
                });
              }).on('error', (err) => {
                console.error('Error funding account:', err);
                reject(err);
              });
            });
          }

          function sendResponse(event, response) {
            return new Promise((resolve, reject) => {
              const parsedUrl = url.parse(event.ResponseURL);
              const requestOptions = {
                hostname: parsedUrl.hostname,
                port: 443,
                path: parsedUrl.path,
                method: 'PUT',
                headers: {
                  'Content-Type': '',
                  'Content-Length': Buffer.byteLength(JSON.stringify(response))
                }
              };

              const request = https.request(requestOptions, (resp) => {
                resolve();
              });

              request.on('error', (error) => {
                console.error('Error sending response:', error);
                reject(error);
              });

              request.write(JSON.stringify(response));
              request.end();
            });
          }

          exports.handler = async (event, context) => {
            try {
              let response = {
                Status: 'SUCCESS',
                RequestId: event.RequestId,
                LogicalResourceId: event.LogicalResourceId,
                StackId: event.StackId,
                PhysicalResourceId: context.logStreamName
              };

              if (event.RequestType === 'Delete') {
                console.log('Delete request, sending success response');
              } else {
                const seed = (event.ResourceProperties.SecretSeed || '').trim();
                const pair = seed ? Keypair.fromSecret(seed) : Keypair.random();
                console.log(seed ? 'Deriving keypair from provided seed' : 'Generating new keypair');
                response.Data = {
                  publicKey: pair.publicKey(),
                  secretKey: pair.secret()
                };

                // Only fund a freshly *generated* distribution account (testnet); never a provided seed.
                if (event.ResourceProperties.KeyPairId === 'distribution' && !seed) {
                  console.log('Funding distribution account on testnet');
                  try {
                    await fundTestnetAccount(pair.publicKey());
                    console.log('Successfully funded account');
                  } catch (fundError) {
                    console.error('Error funding account:', fundError);
                  }
                }
              }

              await sendResponse(event, response);
              return response;

            } catch (error) {
              console.error('Error:', error);
              const response = {
                Status: 'FAILED',
                RequestId: event.RequestId,
                LogicalResourceId: event.LogicalResourceId,
                StackId: event.StackId,
                PhysicalResourceId: context.logStreamName,
                Reason: error.toString()
              };
              await sendResponse(event, response);
              return response;
            }
          };

  Sep10KeyGenPair:
    Type: Custom::StellarKeyPair
    Condition: GenerateSep10Keys
    Properties:
      ServiceToken: !GetAtt StellarKeyGenFunction.Arn
      KeyPairId: sep10
      SecretSeed: !Ref Sep10SigningPrivateKey

  DistributionKeyGenPair:
    Type: Custom::StellarKeyPair
    Condition: GenerateDistributionKeys
    Properties:
      ServiceToken: !GetAtt StellarKeyGenFunction.Arn
      KeyPairId: distribution
      SecretSeed: !Ref DistributionSeed

  DistributionEncryptionKeyGenPair:
    Type: Custom::StellarKeyPair
    Condition: GenerateDistributionEncryptionPassphrase
    Properties:
      ServiceToken: !GetAtt StellarKeyGenFunction.Arn
      KeyPairId: distribution-encryption

  ChannelEncryptionKeyGenPair:
    Type: Custom::StellarKeyPair
    Condition: GenerateChannelEncryptionPassphrase
    Properties:
      ServiceToken: !GetAtt StellarKeyGenFunction.Arn
      KeyPairId: channel-encryption
  
  Sep10SigningPrivateKeySm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/SEP10_SIGNING_PRIVATE_KEY
      Description: "SEP10 signing private key"
      SecretString: !If [GenerateSep10Keys, !GetAtt Sep10KeyGenPair.secretKey, !Ref Sep10SigningPrivateKey]

  Sep10SigningPublicKeySm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/SEP10_SIGNING_PUBLIC_KEY
      Description: "SEP10 signing public key"
      SecretString: !If [GenerateSep10Keys, !GetAtt Sep10KeyGenPair.publicKey, !Ref Sep10SigningPublicKey]

  DistributionSeedSm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/DISTRIBUTION_SEED
      Description: "Distribution account seed"
      SecretString: !If [GenerateDistributionKeys, !GetAtt DistributionKeyGenPair.secretKey, !Ref DistributionSeed]

  DistributionPublicKeySm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/DISTRIBUTION_PUBLIC_KEY
      Description: "Distribution account public key"
      SecretString: !If [GenerateDistributionKeys, !GetAtt DistributionKeyGenPair.publicKey, !Ref DistributionPublicKey]

  DistributionEncryptionPassphraseSm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/DISTRIBUTION_ACCOUNT_ENCRYPTION_PASSPHRASE
      Description: "Distribution account encryption passphrase"
      SecretString: !If [GenerateDistributionEncryptionPassphrase, !GetAtt DistributionEncryptionKeyGenPair.secretKey, !Ref DistributionAccountEncryptionPassphrase]

  ChannelEncryptionPassphraseSm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/CHANNEL_ACCOUNT_ENCRYPTION_PASSPHRASE
      Description: "Channel account encryption passphrase"
      SecretString: !If [GenerateChannelEncryptionPassphrase, !GetAtt ChannelEncryptionKeyGenPair.secretKey, !Ref ChannelAccountEncryptionPassphrase]

  Ec256PrivateKeySm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/EC256_PRIVATE_KEY
      Description: "EC256 private key"
      SecretString: !Ref Ec256PrivateKey

  Sep24JwtSm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/SEP24_JWT_SECRET
      Description: "SEP24 JWT secret"
      SecretString: !Ref Sep24JwtSecret

  AdminApiKeySm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/ADMIN_API_KEY
      Description: "Admin API key"
      SecretString: !Ref AdminApiKey

  AdminAccountSm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/ADMIN_ACCOUNT
      Description: "Admin account ID"
      SecretString: !Ref AdminAccount

  RecaptchaSiteSecretKeySm:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${namespace}/${env}/RECAPTCHA_SITE_SECRET_KEY
      Description: "Recaptcha site secret key"
      SecretString: !Ref RecaptchaSiteSecretKey

  AwsAccessKeyIdSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasAwsAccessKeyId
    Properties:
      Name: !Sub /${namespace}/${env}/AWS_ACCESS_KEY_ID
      Description: "AWS IAM access key ID"
      SecretString: !Ref AwsAccessKeyId

  AwsSecretAccessKeySm:
    Type: AWS::SecretsManager::Secret
    Condition: HasAwsSecretAccessKey
    Properties:
      Name: !Sub /${namespace}/${env}/AWS_SECRET_ACCESS_KEY
      Description: "AWS IAM secret access key"
      SecretString: !Ref AwsSecretAccessKey

  AwsRegionSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasAwsRegion
    Properties:
      Name: !Sub /${namespace}/${env}/AWS_REGION
      Description: "AWS region for SES/SNS"
      SecretString: !Ref AwsRegion

  AwsSesSenderIdSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasAwsSesSenderId
    Properties:
      Name: !Sub /${namespace}/${env}/AWS_SES_SENDER_ID
      Description: "AWS SES sender identifier"
      SecretString: !Ref AwsSesSenderId

  AwsSnsSenderIdSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasAwsSnsSenderId
    Properties:
      Name: !Sub /${namespace}/${env}/AWS_SNS_SENDER_ID
      Description: "AWS SNS sender identifier"
      SecretString: !Ref AwsSnsSenderId

  TwilioAccountSidSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioAccountSid
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_ACCOUNT_SID
      Description: "Twilio account SID"
      SecretString: !Ref TwilioAccountSid

  TwilioAuthTokenSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioAuthToken
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_AUTH_TOKEN
      Description: "Twilio auth token"
      SecretString: !Ref TwilioAuthToken

  TwilioServiceSidSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioServiceSid
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_SERVICE_SID
      Description: "Twilio service SID"
      SecretString: !Ref TwilioServiceSid

  TwilioWhatsappFromNumberSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioWhatsappFromNumber
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_WHATSAPP_FROM_NUMBER
      Description: "Twilio WhatsApp from number"
      SecretString: !Ref TwilioWhatsappFromNumber

  TwilioWhatsappReceiverInvitationTemplateSidSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioWhatsappReceiverInvitationTemplateSid
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_WHATSAPP_RECEIVER_INVITATION_TEMPLATE_SID
      Description: "Twilio WhatsApp receiver invitation template SID"
      SecretString: !Ref TwilioWhatsappReceiverInvitationTemplateSid

  TwilioWhatsappReceiverOtpTemplateSidSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioWhatsappReceiverOtpTemplateSid
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_WHATSAPP_RECEIVER_OTP_TEMPLATE_SID
      Description: "Twilio WhatsApp receiver OTP template SID"
      SecretString: !Ref TwilioWhatsappReceiverOtpTemplateSid

  TwilioSendgridApiKeySm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioSendgridApiKey
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_SENDGRID_API_KEY
      Description: "Twilio SendGrid API key"
      SecretString: !Ref TwilioSendgridApiKey

  TwilioSendgridSenderAddressSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasTwilioSendgridSenderAddress
    Properties:
      Name: !Sub /${namespace}/${env}/TWILIO_SENDGRID_SENDER_ADDRESS
      Description: "Twilio SendGrid sender address"
      SecretString: !Ref TwilioSendgridSenderAddress

  SentryDsnSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasSentryDsn
    Properties:
      Name: !Sub /${namespace}/${env}/SENTRY_DSN
      Description: "Sentry DSN"
      SecretString: !Ref SentryDsn

  RpcRequestAuthHeaderValueSm:
    Type: AWS::SecretsManager::Secret
    Condition: HasRpcRequestAuthHeaderValue
    Properties:
      Name: !Sub /${namespace}/${env}/RPC_REQUEST_AUTH_HEADER_VALUE
      Description: "Auth header value for protected RPC server"
      SecretString: !Ref RpcRequestAuthHeaderValue

  BridgeApiKeySm:
    Type: AWS::SecretsManager::Secret
    Condition: HasBridgeApiKey
    Properties:
      Name: !Sub /${namespace}/${env}/BRIDGE_API_KEY
      Description: "Bridge integration API key"
      SecretString: !Ref BridgeApiKey