# Detect whether the request is a direct browser navigation (page refresh) or
# an API call from JavaScript. When a user refreshes the SPA at a React Router
# path like /disbursements/123, the browser sends Accept: text/html, whereas
# JavaScript fetch/XHR sends Accept: application/json. We use this to decide
# whether to serve the SPA or proxy to the backend.
map $http_accept $is_browser_nav {
    default       0;
    "~*text/html" 1;
}

server {
    listen __PUBLIC_PORT__ default_server;
    server_name _;

    # ----------------------------------------------------------------
    # Gzip
    # ----------------------------------------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font
        application/x-font-opentype
        application/x-font-otf
        application/x-font-truetype
        application/x-font-ttf
        application/x-javascript
        application/xhtml+xml
        application/xml
        font/opentype
        font/otf
        font/ttf
        image/svg+xml
        image/x-icon
        text/css
        text/javascript
        text/plain
        text/xml;

    # ----------------------------------------------------------------
    # Go backend — proxy all known API paths to the backend's internal port.
    # These are the routes registered in serve.go (no /api/ prefix).
    # ----------------------------------------------------------------
    location ~ ^/(login|mfa|forgot-password|reset-password|refresh-token|logout|app-config|users|disbursements|payments|receivers|assets|wallets|profile|organization|exports|statistics|api-keys|registration-contact-types|kenyan-bank-integration|bridge-integration|embedded-wallets|balances|r/|sep|\.well-known|health) {
        # Browser page refresh / direct navigation → serve the SPA instead
        # of proxying to the backend. This lets React Router handle the route
        # client-side. Only GET requests can trigger this — POST/PUT/DELETE
        # API calls always reach the backend.
        if ($is_browser_nav) {
            set $spa_fallback "1";
        }
        if ($request_method != GET) {
            set $spa_fallback "";
        }
        if ($spa_fallback) {
            rewrite .* /index.html last;
        }

        proxy_pass http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ----------------------------------------------------------------
    # SPA — serve static files; fall back to index.html for React Router
    # ----------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        gzip_static on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
