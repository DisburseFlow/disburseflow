server {
    listen __PUBLIC_PORT__ default_server;
    server_name _;

    # ----------------------------------------------------------------
    # Gzip
    # ----------------------------------------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font
        application/x-font-opentype
        application/x-font-otf
        application/x-font-truetype
        application/x-font-ttf
        application/x-javascript
        application/xhtml+xml
        application/xml
        font/opentype
        font/otf
        font/ttf
        image/svg+xml
        image/x-icon
        text/css
        text/javascript
        text/plain
        text/xml;

    # ----------------------------------------------------------------
    # Go backend — proxy all known API paths to the backend's internal port.
    # These are the routes registered in serve.go (no /api/ prefix).
    # ----------------------------------------------------------------
    location ~ ^/(login|mfa|forgot-password|reset-password|refresh-token|logout|app-config|users|disbursements|payments|receivers|assets|wallets|profile|organization|exports|statistics|api-keys|r/|sep|\.well-known|health) {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ----------------------------------------------------------------
    # SPA — serve static files; fall back to index.html for React Router
    # ----------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        gzip_static on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
